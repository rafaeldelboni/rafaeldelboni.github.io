name: Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install stabilis
        run: curl -sSf https://raw.githubusercontent.com/rafaeldelboni/stabilis/main/install.sh | bash -s -- --dir /usr/local/bin

      - name: Build site
        run: stabilis build -c

      - name: Install minify
        run: |
          curl -sSL https://github.com/tdewolff/minify/releases/download/v2.24.13/minify_linux_amd64.tar.gz | tar -xz -C /usr/local/bin minify

      - name: Minify assets
        run: minify -r -o public public

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5